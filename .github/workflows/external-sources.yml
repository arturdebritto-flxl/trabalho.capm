name: External Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  external-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Yahoo and BCB smoke
        run: python main.py --ticker PETR4.SA --market ^BVSP --start 2024-01-01 --end 2024-12-31 --source yahoo --risk-free-source bcb_sgs --yes
